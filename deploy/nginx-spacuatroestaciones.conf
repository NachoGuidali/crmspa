# nginx del host para Estancia Cuatro Estaciones
# - spacuatroestaciones.com      → web pública ESTÁTICA (la carpeta web/)
# - crm.spacuatroestaciones.com  → CRM (Django/gunicorn dockerizado en 127.0.0.1:8003)
#
# Copiar a /etc/nginx/sites-available/spacuatroestaciones y linkear a sites-enabled/.
# Después correr certbot (ver docs/deploy.md) para el SSL — certbot completa solo los bloques 443.

# ─────────────────────────────  WEB PÚBLICA  ─────────────────────────────
server {
    listen 80;
    server_name spacuatroestaciones.com www.spacuatroestaciones.com;

    # Carpeta web/ dentro del repo clonado. Si clonás en otra ruta, ajustá esto.
    root /opt/crmspa/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets (fotos, js, logo)
    location ~* \.(jpg|jpeg|png|webp|gif|svg|js|css|woff2?)$ {
        expires 7d;
        access_log off;
    }
}

# ────────────────────────────────  CRM  ─────────────────────────────────
server {
    listen 80;
    server_name crm.spacuatroestaciones.com;

    client_max_body_size 20M;  # subida de imágenes de circuitos, adjuntos de WhatsApp

    location / {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
