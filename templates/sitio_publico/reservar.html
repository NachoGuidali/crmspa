{% extends "sitio_publico/_public_base.html" %}
{% block content %}
<div class="publico-form-card">
  <h1 style="font-size:1.4rem;">Reservar {{ circuito.nombre }}</h1>
  {% if error %}<p style="color:#a33;">{{ error }}</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <label>Tu nombre</label>
      <input type="text" name="nombre_contacto" required>
    </div>
    <div class="form-row">
      <label>Tu WhatsApp</label>
      <input type="text" name="telefono" placeholder="+54 9 11 ..." required>
    </div>
    <div class="form-row">
      <label>Fecha</label>
      <input type="date" name="fecha" required>
    </div>
    <div class="form-row">
      <label>Turno</label>
      <select name="turno_id" required>
        {% for t in turnos %}<option value="{{ t.id }}">{{ t.nombre }} ({{ t.hora_inicio|time:"H:i" }}-{{ t.hora_fin|time:"H:i" }})</option>{% endfor %}
      </select>
    </div>
    <div class="form-row">
      <label>Cantidad de personas</label>
      <input type="number" name="cantidad_personas" value="1" min="1" max="{{ circuito.capacidad_maxima }}" required>
    </div>
    <button type="submit" class="btn" style="width:100%;">Confirmar reserva</button>
  </form>
</div>
{% endblock %}
