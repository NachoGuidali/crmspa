{% load static %}<!DOCTYPE html>
<html lang="es-ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Estancia Cuatro Estaciones — Spa de Campo{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/publico.css' %}">
</head>
<body class="publico">
  <header class="publico-header">
    <div class="publico-header-inner">
      <a href="{% url 'sitio_publico:vidriera' %}" class="brand-serif" style="color:var(--color-crema); font-size:1.3rem;">Estancia Cuatro Estaciones</a>
      <span class="publico-tag">Spa de Campo</span>
    </div>
  </header>
  <main class="publico-main">
    {% block content %}{% endblock %}
  </main>
  <footer class="publico-footer">
    Estancia Cuatro Estaciones · Spa de Campo · Virrey del Pino, La Matanza, Bs. As.
  </footer>
</body>
</html>
